name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  Update_Draft_Release:
    name: Release Drafter
    runs-on: ubuntu-latest
    steps:
      - name: Update Release Draft
        uses: release-drafter/release-drafter@v7.1.1
        with:
          commitish: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
