name: E2E
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
jobs:
  e2e:
    name: E2E (kind + Technitium + external-dns + webhook)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout webhook repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout helm-technitium-chart
        uses: actions/checkout@v4
        with:
          repository: Bugs5382/helm-technitium-chart
          path: helm-technitium-chart
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build webhook binary
        run: |
          mkdir -p dist/external-dns-technitium-webhook_linux_amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath \
              -o dist/external-dns-technitium-webhook_linux_amd64/external-dns-technitium-webhook \
              ./cmd/webhook

      - name: Build webhook container image
        run: |
          docker build \
            --build-arg TARGETARCH=amd64 \
            -t external-dns-technitium-webhook:e2e \
            .

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: e2e
          wait: 120s

      - name: Load webhook image into kind
        run: kind load docker-image external-dns-technitium-webhook:e2e --name e2e

      - name: Run e2e
        env:
          TECHNITIUM_CHART_PATH: ./helm-technitium-chart/technitium
        run: ./__test__/e2e/run.sh

      - name: Cluster diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl get pods -A -o wide || true
          kubectl get events -A --sort-by=.lastTimestamp || true
