name: 📚 Documentation
description: Report missing, incorrect, or unclear documentation.
title: "docs: <short summary>"
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the issue?
      description: File path, README section heading, or URL.
      placeholder: README.md → "Kubernetes Deployment" section
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Quote the existing text and explain what is incorrect, unclear, or absent.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: A drop-in replacement, an outline of what to add, or a question you needed answered.

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I am willing to open a PR with the fix.
