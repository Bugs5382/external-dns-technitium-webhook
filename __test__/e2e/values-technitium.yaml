# Values for the Bugs5382/helm-technitium-chart used in the e2e workflow.
# Goal: deterministic Service name, predictable admin credentials, kind-friendly Service type.
fullnameOverride: technitium

config:
  # Technitium requires a server name; arbitrary for tests.
  dnsDomain: "e2e.local"
  # Bootstraps the admin user's password via DNS_SERVER_ADMIN_PASSWORD.
  # Username is fixed as "admin" by Technitium.
  adminPassword: "admin"

# kind has no LoadBalancer controller; ClusterIP is enough for the webhook
# to reach the API and for kubectl port-forward to verify the zone.
service:
  type: ClusterIP
