# Values for the upstream external-dns chart used in the e2e workflow.
# The webhook image is built locally and loaded into kind as
# external-dns-technitium-webhook:e2e — pullPolicy must be Never.
logLevel: debug
policy: sync
interval: 30s

sources:
  - service
  - ingress

# Tighten reconcile so the test does not have to wait a full minute.
extraArgs:
  - --events
  - --min-event-sync-interval=10s

provider:
  name: webhook
  webhook:
    image:
      repository: external-dns-technitium-webhook
      tag: e2e
      pullPolicy: Never
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 20000
      runAsGroup: 20000
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    env:
      - name: DOMAIN_FILTER
        value: "example.test"
      - name: LOG_LEVEL
        value: debug
      - name: TECHNITIUM_HOST
        value: "http://technitium.technitium.svc.cluster.local"
      - name: TECHNITIUM_PORT
        value: "5380"
      - name: TECHNITIUM_USER
        valueFrom:
          secretKeyRef:
            name: technitium-credentials
            key: username
      - name: TECHNITIUM_PASSWORD
        valueFrom:
          secretKeyRef:
            name: technitium-credentials
            key: password
      - name: SERVER_PORT
        value: "8888"
      - name: HEALTH_CHECK_PORT
        value: "8080"
      - name: TECHNITIUM_DRY_RUN
        value: "false"
