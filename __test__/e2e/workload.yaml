# Test workload: a headless ClusterIP Service whose annotations tell
# external-dns to create an A record for e2e.example.test → 10.0.0.42
# in the configured Technitium zone.
apiVersion: v1
kind: Service
metadata:
  name: e2e-app
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "e2e.example.test"
    external-dns.alpha.kubernetes.io/target: "10.0.0.42"
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: e2e-app
  ports:
    - name: http
      port: 80
      targetPort: 80
