version: 2

builds:
  - binary: external-dns-technitium-webhook
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goarch:
      - amd64
      - arm64
    goos:
      - linux
    ldflags:
      - -X 'main.Version={{ .Tag }}'
      - -X 'main.Gitsha={{ .ShortCommit }}'
    main: ./cmd/webhook

source:
  enabled: false

dockers_v2:
  - images:
      - ghcr.io/bugs5382/external-dns-technitium-webhook
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "latest"
      - "{{ .Env.CI_COMMIT_SHA }}"
      - "{{ if .Env.CI_COMMIT_TAG }}{{ .Env.CI_COMMIT_TAG }}{{ end }}"
    extra_files:
      - dist/
    flags:
      - --pull
      - --label=org.opencontainers.image.created={{.Date}}
      - --label=org.opencontainers.image.name={{.ProjectName}}
      - --label=org.opencontainers.image.revision={{.FullCommit}}
      - --label=org.opencontainers.image.version={{.Version}}
      - --build-arg=CI_COMMIT_TIMESTAMP={{ .Env.CI_COMMIT_TIMESTAMP }}
      - --build-arg=CI_COMMIT_SHA={{ .Env.CI_COMMIT_SHA }}
      - --build-arg=CI_COMMIT_TAG={{ .Env.CI_COMMIT_TAG }}

changelog:
  disable: true

release:
  disable: true
